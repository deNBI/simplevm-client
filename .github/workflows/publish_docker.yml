name: Publish Docker
on:
  workflow_dispatch:
  push:
    branches:
      - 'master'
      - 'staging'
      - 'dev'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      - name: Workflow run cleanup action
        uses: rokroskar/workflow-run-cleanup-action@v0.3.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/checkout@v6.0.2
      - name: Extract branch name
        shell: bash
        run: echo "##[set-output name=branch;]$(echo ${GITHUB_REF#refs/heads/})"
        id: extract_branch

      - name: Set tag
        run: sed 's/\//-/g'  <<< "::set-output name=TAG::${{ steps.extract_branch.outputs.branch }}"
        id: tag
      - name: Get tag
        run: echo "The selected tag is ${{ steps.tag.outputs.TAG }}"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to de.NBI OCI
        uses: docker/login-action@v4
        with:
          registry: oci.bi.denbi.de
          username: ${{ secrets.OCI_USERNAME }}
          password: ${{ secrets.OCI_TOKEN }}
      - name: Build and publish image to de:NBI OCI
        uses: docker/build-push-action@v7
        with:
          file: Dockerfile
          push: true
          tags: oci.bi.denbi.de/simplevm/simplevm-client:${{ steps.tag.outputs.TAG }}
